version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: age_gender_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: age_gender_detection
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount the schema file to initialize the database if it starts fresh
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d age_gender_detection"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: age_gender_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/age_gender_detection
      - ENV=production
    volumes:
      # Persist prediction uploads on the host system
      - ./backend/app/uploads:/workspace/backend/app/uploads
      # Persist ML models inside the container
      - backend_models:/workspace/backend/app/ml/models
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  backend_models:
